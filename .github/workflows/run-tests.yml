name: tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Laravel 10 supports PHP 8.1–8.3; Laravel 11 supports PHP 8.2+.
        include:
          - { php: '8.1', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '10.*', testbench: '8.*' }
          - { php: '8.3', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '11.*', testbench: '9.*' }
          - { php: '8.3', laravel: '11.*', testbench: '9.*' }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, fileinfo, pdo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          # Laravel 10 is EOL and carries unpatched advisories; allow installing
          # it so we can still test compatibility against it.
          composer config --no-plugins policy.advisories.block false
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, fileinfo, pdo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install production dependencies only
        run: |
          composer config --no-plugins policy.advisories.block false
          # Drop the dev deps before resolving: Testbench pulls laravel/framework,
          # which `replace`s the individual illuminate/* packages and masks them.
          # (`--no-dev` only skips install, not resolution, so it isn't enough.)
          composer remove --dev --no-update $(jq -r '."require-dev" | keys[]' composer.json)
          composer update --prefer-dist --no-interaction --no-progress

      - name: Check for missing dependencies
        run: |
          curl -fsSL https://github.com/maglnet/ComposerRequireChecker/releases/download/4.20.0/composer-require-checker.phar -o composer-require-checker.phar
          php composer-require-checker.phar check --config-file=composer-require-checker.json composer.json
